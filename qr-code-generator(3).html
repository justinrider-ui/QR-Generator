<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            text-align: center;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            font-family: monospace;
        }
        
        input:focus {
            outline: none;
            border-color: #378add;
            box-shadow: 0 0 0 3px rgba(55, 138, 221, 0.1);
        }
        
        .qr-display {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 30px;
            margin: 30px 0;
            text-align: center;
            min-height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .qr-display img {
            max-width: 100%;
            height: auto;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        #downloadBtn {
            background: #378add;
            color: white;
            border-color: #378add;
        }
        
        #downloadBtn:hover {
            background: #2a6bb8;
            border-color: #2a6bb8;
        }
        
        #printBtn {
            background: white;
            color: #333;
            border-color: #ddd;
        }
        
        #printBtn:hover {
            background: #f5f5f5;
        }
        
        .info {
            font-size: 13px;
            color: #999;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>QR Code Generator</h1>
        
        <div class="form-group">
            <label for="urlInput">Website URL</label>
            <input 
                type="text" 
                id="urlInput" 
                value="https://example.com" 
                placeholder="https://example.com"
            >
        </div>
        
        <div class="qr-display">
            <img id="qrImage" src="https://api.qrserver.com/v1/create-qr-code/?size=256x256&data=https://example.com" alt="QR Code">
        </div>
        
        <div class="button-group">
            <button id="downloadBtn">Download PNG</button>
            <button id="printBtn">Print</button>
        </div>
        
        <div class="info">Updates as you type</div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const qrImage = document.getElementById('qrImage');
        const downloadBtn = document.getElementById('downloadBtn');
        const printBtn = document.getElementById('printBtn');

        function updateQR(url) {
            if (!url.trim()) {
                return;
            }
            const encodedUrl = encodeURIComponent(url);
            qrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=256x256&data=${encodedUrl}`;
        }

        urlInput.addEventListener('input', (e) => {
            updateQR(e.target.value);
        });

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.href = qrImage.src;
            link.download = 'qr-code.png';
            link.click();
        });

        printBtn.addEventListener('click', () => {
            const printWindow = window.open('', '', 'width=600,height=700');
            printWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>QR Code</title>
                    <style>
                        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: system-ui; }
                        .container { text-align: center; padding: 2rem; }
                        img { max-width: 400px; margin-bottom: 1rem; }
                        p { color: #666; }
                    </style>
                </head>
                <body>
                    <div class="container">
                        <img src="${qrImage.src}" alt="QR Code">
                        <p>${urlInput.value}</p>
                    </div>
                </body>
                </html>
            `);
            printWindow.document.close();
            setTimeout(() => printWindow.print(), 250);
        });

        updateQR('https://example.com');
    </script>
</body>
</html>
